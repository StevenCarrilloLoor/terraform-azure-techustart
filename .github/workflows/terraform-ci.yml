name: Terraform CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  format:
    name: Terraform format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Check formatting
        run: terraform fmt -check -recursive

  validate:
    name: Validate ${{ matrix.configuration }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - .
          - demo-terraform

    defaults:
      run:
        working-directory: ${{ matrix.configuration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Initialize
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

      - name: Test Azure architecture
        if: matrix.configuration == '.'
        run: terraform test
